spring:
  application:
    name: spring-ddd-template
  config:
    # 导入项目根目录的 .env（KEY=VALUE 与 properties 格式兼容），文件不存在时跳过
    import: optional:file:.env[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:spring_ddd_template}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
  servlet:
    multipart:
      # 与 app.file.max-size 保持一致（框架层先行拦截超大请求）
      max-file-size: 10MB
      max-request-size: 20MB
  flyway:
    enabled: true
    locations: classpath:db/migration
    # 兼容已有库：schema 非空时以当前版本为基线（V1 不再执行），全新库正常从 V1 迁移
    baseline-on-migrate: true

mybatis-flex:
  global-config:
    # 逻辑删除：0-正常，1-已删除
    normal-value-of-logic-delete: 0
    deleted-value-of-logic-delete: 1

# Sa-Token 配置
sa-token:
  # token 名称（同时也是请求头名称）
  token-name: sa-token
  # token 有效期（秒），30 天；-1 代表永不过期
  timeout: 2592000
  # 仅从请求头读取 token，前后端分离场景关闭 cookie
  is-read-header: true
  is-read-cookie: false
  # token 风格
  token-style: uuid
  # 允许同一账号多地登录
  is-concurrent: true

# springdoc-openapi：/swagger-ui.html（UI）、/v3/api-docs（JSON）
springdoc:
  swagger-ui:
    path: /swagger-ui.html

# 应用自定义配置
app:
  lock:
    # 分级锁实现：redis-分布式（默认）| jvm-单机
    type: redis
  file:
    # 存储实现：local-本地磁盘（默认）| s3-S3 兼容对象存储（阿里云 OSS、腾讯云 COS、MinIO 等）
    storage-type: local
    # 单文件大小上限（存储实现校验，与 spring.servlet.multipart 保持一致）
    max-size: 10MB
    local:
      # 本地存储根目录（相对应用工作目录或绝对路径）
      base-path: ./data/files
    s3:
      # 服务端点：阿里云 https://oss-cn-hangzhou.aliyuncs.com | 腾讯云 https://cos.ap-shanghai.myqcloud.com | MinIO http://127.0.0.1:9000
      endpoint: ${S3_ENDPOINT:}
      # 区域：阿里云 oss-cn-hangzhou | 腾讯云 ap-shanghai | MinIO 等无区域概念的服务商保持默认
      region: ${S3_REGION:us-east-1}
      # 访问密钥（阿里云 AccessKeyId/AccessKeySecret、腾讯云 SecretId/SecretKey），走环境变量不落盘
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}
      # 存储桶名称（需预先创建）
      bucket: ${S3_BUCKET:}
      # 路径风格访问：MinIO 需 true；阿里云 OSS/腾讯云 COS 用虚拟主机风格（false）
      path-style-access: ${S3_PATH_STYLE_ACCESS:false}
