# 公共配置（环境相关配置见 application-dev.yaml / application-prod.yaml）
spring:
  application:
    name: spring-ddd-template
  profiles:
    # 默认激活 dev，生产通过环境变量 SPRING_PROFILES_ACTIVE=prod 覆盖
    active: dev
  datasource:
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    # 兼容已有库：schema 非空时以当前版本为基线（V1 不再执行），全新库正常从 V1 迁移
    baseline-on-migrate: true

mybatis-flex:
  global-config:
    # 逻辑删除：0-正常，1-已删除
    normal-value-of-logic-delete: 0
    deleted-value-of-logic-delete: 1

# Sa-Token 配置
sa-token:
  # token 名称（同时也是请求头名称）
  token-name: satoken
  # token 有效期（秒），30 天；-1 代表永不过期
  timeout: 2592000
  # 仅从请求头读取 token，前后端分离场景关闭 cookie
  is-read-header: true
  is-read-cookie: false
  # token 风格
  token-style: uuid
  # 允许同一账号多地登录
  is-concurrent: true

# springdoc-openapi：/swagger-ui.html（UI）、/v3/api-docs（JSON）
springdoc:
  swagger-ui:
    path: /swagger-ui.html

# 应用自定义配置
app:
  lock:
    # 分级锁实现：redis-分布式（默认）| jvm-单机
    type: redis
