# 生产环境：数据库/Redis 连接全部走环境变量，不在配置文件中保存任何密钥
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

# 生产环境关闭 swagger-ui 和 openapi api-docs，避免接口暴露
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
