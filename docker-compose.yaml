# 本地开发依赖：PostgreSQL 17 + Redis 7
# 使用：docker compose up -d；建表由应用启动时 Flyway 自动完成
services:
  postgres:
    image: postgres:17
    container_name: spring-ddd-template-postgres
    environment:
      POSTGRES_DB: spring_ddd_template
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d spring_ddd_template" ]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: spring-ddd-template-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  redis-data:
